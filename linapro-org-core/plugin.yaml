    # Button permission code.
    # 按钮权限标识。
    perms: system:dept:add
    # Menu type enum. Allowed values: `D` directory, `M` menu page, `B` button permission node.
    # 菜单类型枚举。可选值：`D` 表示目录，`M` 表示菜单页面，`B` 表示按钮权限点。
    type: B
    # Button sort order; lower values appear earlier.
    # 按钮排序值，数值越小越靠前。
    sort: 2
  # Unique button key mounted under the department management menu.
  # 按钮唯一键，挂载在部门管理菜单下。
  - key: plugin:linapro-org-core:dept:edit

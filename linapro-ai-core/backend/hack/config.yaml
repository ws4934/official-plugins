# CLI tool, only in development environment.
# https://goframe.org/docs/cli
gfcli:
  gen:
    dao:
      - link: "pgsql:postgres:postgres@tcp(127.0.0.1:5432)/linapro?sslmode=disable"
        path: "internal"
        tables: >-
          plugin_linapro_ai_provider,
          plugin_linapro_ai_provider_endpoint,
          plugin_linapro_ai_model,
          plugin_linapro_ai_model_capability,
          plugin_linapro_ai_tier,
          plugin_linapro_ai_tier_binding,
          plugin_linapro_ai_invocation,
          plugin_linapro_ai_provider_operation
        removePrefix: "plugin_linapro_ai_"
        importPrefix: "lina-plugin-linapro-ai-core/backend/internal"
        descriptionTag: true
        noModelComment: true
        stdTime: true
        typeMapping:
          timestamp:
            type: "*time.Time"
            import: time
          "timestamp without time zone":
            type: "*time.Time"
            import: time
          timestamptz:
            type: "*time.Time"
            import: time
          "timestamp with time zone":
            type: "*time.Time"
            import: time

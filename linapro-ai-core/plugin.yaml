id: linapro-ai-core
name: AI Hub
version: v0.1.25
type: source
scope_nature: platform_only
supports_multi_tenant: false
default_install_mode: global
description: Official source plugin for AI providers, models, capability tiers, and request logs
author: linapro
license: Apache-2.0

i18n:
  enabled: true
  default: zh-CN
  locales:
    - locale: en-US
      nativeName: English
    - locale: zh-CN
      nativeName: 简体中文

menus:
  - key: plugin:linapro-ai-core:smart-center
    name: AI Hub
    path: ai
    perms: ai:center:view
    icon: lucide:brain-circuit
    type: D
    sort: 8
    remark: AI Hub top-level directory
  - key: plugin:linapro-ai-core:providers
    parent_key: plugin:linapro-ai-core:smart-center
    name: Providers
    path: /ai/providers
    component: system/plugin/dynamic-page
    perms: ai:provider:list
    icon: lucide:server-cog
    type: M
    sort: 1
    remark: Manage AI providers
  - key: plugin:linapro-ai-core:providers:query
    parent_key: plugin:linapro-ai-core:providers
    name: Query Providers
    perms: ai:provider:list
    type: B
    sort: 1
  - key: plugin:linapro-ai-core:providers:create
    parent_key: plugin:linapro-ai-core:providers
    name: Create Provider
    perms: ai:provider:create
    type: B
    sort: 2
  - key: plugin:linapro-ai-core:providers:update
    parent_key: plugin:linapro-ai-core:providers
    name: Update Provider
    perms: ai:provider:update
    type: B
    sort: 3
  - key: plugin:linapro-ai-core:providers:delete
    parent_key: plugin:linapro-ai-core:providers
    name: Delete Provider
    perms: ai:provider:delete
    type: B
    sort: 4
  - key: plugin:linapro-ai-core:models
    parent_key: plugin:linapro-ai-core:smart-center
    name: Models
    path: /ai/models
    component: system/plugin/dynamic-page
    perms: ai:provider:list
    icon: lucide:box
    type: M
    sort: 2
    remark: Manage AI provider models
  - key: plugin:linapro-ai-core:models:query
    parent_key: plugin:linapro-ai-core:models
    name: Query Models
    perms: ai:provider:list
    type: B
    sort: 1
  - key: plugin:linapro-ai-core:models:create
    parent_key: plugin:linapro-ai-core:models
    name: Create Model
    perms: ai:provider:create
    type: B
    sort: 2
  - key: plugin:linapro-ai-core:models:update
    parent_key: plugin:linapro-ai-core:models
    name: Update Model
    perms: ai:provider:update
    type: B
    sort: 3
  - key: plugin:linapro-ai-core:models:delete
    parent_key: plugin:linapro-ai-core:models
    name: Delete Model
    perms: ai:provider:delete
    type: B
    sort: 4
  - key: plugin:linapro-ai-core:tiers
    parent_key: plugin:linapro-ai-core:smart-center
    name: AI Tiers
    path: /ai/tiers
    component: system/plugin/dynamic-page
    perms: ai:tier:list
    icon: lucide:sliders-horizontal
    type: M
    sort: 3
    remark: Manage basic, standard, and advanced AI capability tiers
  - key: plugin:linapro-ai-core:tiers:query
    parent_key: plugin:linapro-ai-core:tiers
    name: Query Tiers
    perms: ai:tier:list
    type: B
    sort: 1
  - key: plugin:linapro-ai-core:tiers:update
    parent_key: plugin:linapro-ai-core:tiers
    name: Update Tier
    perms: ai:tier:update
    type: B
    sort: 2
  - key: plugin:linapro-ai-core:tiers:test
    parent_key: plugin:linapro-ai-core:tiers
    name: Test Tier
    perms: ai:tier:test
    type: B
    sort: 3
  - key: plugin:linapro-ai-core:invocations
    parent_key: plugin:linapro-ai-core:smart-center
    name: Request Logs
    path: /ai/invocations
    component: system/plugin/dynamic-page
    perms: ai:invocation:list
    icon: lucide:activity
    type: M
    sort: 4
    remark: View AI request records and masked summaries
  - key: plugin:linapro-ai-core:invocations:query
    parent_key: plugin:linapro-ai-core:invocations
    name: Query Request Logs
    perms: ai:invocation:list
    type: B
    sort: 1
  - key: plugin:linapro-ai-core:invocations:clear
    parent_key: plugin:linapro-ai-core:invocations
    name: Clear Request Logs
    perms: ai:invocation:clear
    type: B
    sort: 2

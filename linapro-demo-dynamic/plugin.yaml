# Plugin identifier, unique across the host and source plugin directories; use `kebab-case`.
# 插件唯一标识，必须在宿主和源码插件目录中保持唯一，并使用 `kebab-case` 命名风格。
id: linapro-demo-dynamic

# Plugin display name used in plugin management pages, developer docs, and presentation.
# 插件显示名称，用于插件管理页面、开发文档和展示。
name: 动态插件示例

# Plugin semantic version; examples in this repo use the `v` prefix.
# 插件语义化版本号，当前示例统一使用带 `v` 前缀的写法。
version: v0.1.0

# Plugin type enum. Allowed values: `source` is compiled with the host; `dynamic` is loaded as a runtime plugin artifact.
# 插件类型枚举。可选值：`source` 表示随宿主源码编译交付；`dynamic` 表示作为运行时动态插件产物加载。
type: dynamic

# Multi-tenant scope enum. Allowed values: `platform_only` is platform-context only; `tenant_aware` is governed by tenant context.
# 多租户作用域枚举。可选值：`platform_only` 表示仅平台上下文可见和治理；`tenant_aware` 表示按租户上下文治理。
scope_nature: tenant_aware

# Multi-tenant support flag. `true` means the plugin supports tenant-level installation and provisioning governance.
# 多租户支持标记。`true` 表示插件支持租户级安装与开通治理。
supports_multi_tenant: true

# Default install mode enum. Allowed values: `global` enables one shared installation; `tenant_scoped` enables or disables per tenant.
# 默认安装模式枚举。可选值：`global` 表示全局统一安装启用；`tenant_scoped` 表示按租户独立启用或禁用。
default_install_mode: tenant_scoped

# Declared public static assets hosted under /x-assets/{plugin-id}/{version}/...
# 声明式公开静态资源目录，由宿主托管到 /x-assets/{plugin-id}/{version}/...
public_assets:
  - source: frontend/pages
    mount: /
    index: index.html

# Plugin description summarizing the capability boundary.
# 插件说明，概述插件的能力边界。
description: 提供独立的 dynamic wasm 插件样例，演示左侧菜单内嵌页面、插件自有 SQL 表 CRUD 与独立静态页面跳转

# Plugin author or owning team.
# 插件作者或归属团队。
author: linapro

# Plugin homepage or documentation URL for extra project, design, or external references.
# 插件主页或文档地址，用于补充项目介绍、设计文档或外部说明链接。
homepage: https://example.com/lina/plugins/linapro-demo-dynamic

# Plugin license identifier.
# 插件许可证标识。
license: Apache-2.0

# Plugin internationalization config. This follows the host i18n config shape;
# enabled plugins must ship manifest/i18n resources for the listed locales.
# 插件国际化配置。该配置与宿主 i18n 配置结构保持一致；启用后需提供对应语言资源。
i18n:
  enabled: true
  default: zh-CN
  locales:
    - locale: en-US
      nativeName: English
    - locale: zh-CN
      nativeName: 简体中文

# Plugin dependency declaration. `framework.version` constrains the compatible
# LinaPro host version, and `plugins` lists plugin-to-plugin dependencies.
# 插件依赖声明。`framework.version` 约束兼容的 LinaPro 宿主版本，`plugins` 声明插件间依赖。
dependencies:
  # LinaPro framework semantic-version range required by this plugin.
  # 当前插件要求的 LinaPro 框架语义化版本范围。
  framework:
    version: ">=0.1.0 <1.0.0"
  # Other plugins required or optionally used by this plugin.
  # 当前插件依赖或可选使用的其他插件。
  plugins:
    # Dependency plugin ID.
    # 依赖插件 ID。
    - id: linapro-demo-source
      # Dependency plugin semantic-version range.
      # 依赖插件语义化版本范围。
      version: ">=0.1.0"

# Host service declaration list for requested host services, methods, and resource boundaries.
# 插件宿主服务声明列表，用于申请调用宿主 service、method 与资源边界。
hostServices:
  # Host service enum. Allowed values: `runtime`, `cron`, `storage`, `network`, and `data`;
  # `runtime` provides logging, state, and runtime information capabilities.
  # 宿主服务枚举。可选值：`runtime`、`cron`、`storage`、`network`、`data`；`runtime` 提供日志、状态和运行时信息能力。
  - service: runtime
    # Requested method set for this host service.
    # 当前宿主服务申请的方法集合。
    methods:
      # Writes structured logs through the host.
      # 写入宿主结构化日志。
      - log.write
      # Reads isolated plugin state.
      # 读取插件隔离状态。
      - state.get
      # Writes isolated plugin state.
      # 写入插件隔离状态。
      - state.set
      # Deletes isolated plugin state.
      # 删除插件隔离状态。
      - state.delete
      # Reads the current host time.
      # 读取宿主当前时间。
      - info.now
      # Generates a host-side UUID.
      # 生成宿主侧 UUID。
      - info.uuid
      # Reads the current host node identifier.
      # 读取当前宿主节点标识。
      - info.node
  # Host service enum. Allowed values: `runtime`, `cron`, `storage`, `network`, and `data`;
  # `cron` registers built-in scheduled jobs from dynamic plugins.
  # 宿主服务枚举。可选值：`runtime`、`cron`、`storage`、`network`、`data`；`cron` 用于注册动态插件内置定时任务。
  - service: cron
    # Requested method set for this host service.
    # 当前宿主服务申请的方法集合。
    methods:
      # Registers a plugin scheduled job.
      # 注册插件定时任务。
      - register
  # Host service enum. Allowed values: `runtime`, `cron`, `storage`, `network`, and `data`;
  # `storage` accesses plugin-isolated storage objects.
  # 宿主服务枚举。可选值：`runtime`、`cron`、`storage`、`network`、`data`；`storage` 用于访问插件隔离存储对象。
  - service: storage
    # Requested method set for this host service.
    # 当前宿主服务申请的方法集合。
    methods:
      # Writes a storage object.
      # 写入存储对象。
      - put
      # Reads a storage object.
      # 读取存储对象。
      - get
      # Deletes a storage object.
      # 删除存储对象。
      - delete
      # Lists storage objects.
      # 列出存储对象。
      - list
      # Reads storage object metadata.
      # 读取存储对象元数据。
      - stat
    # Resource boundary declaration limiting which objects this host service can access.
    # 资源边界声明，限定该宿主服务可访问的对象范围。
    resources:
      # Logical paths or path prefixes allowed for access.
      # 允许访问的逻辑路径或路径前缀列表。
      paths:
        # Example host-call demo object prefix.
        # 示例宿主调用演示对象前缀。
        - host-call-demo/
        # Example record attachment object prefix.
        # 示例记录附件对象前缀。
        - demo-record-files/
  # Host service enum. Allowed values: `runtime`, `cron`, `storage`, `network`, and `data`;
  # `network` performs governed outbound network requests.
  # 宿主服务枚举。可选值：`runtime`、`cron`、`storage`、`network`、`data`；`network` 用于发起受治理的外部网络请求。
  - service: network
    # Requested method set for this host service.
    # 当前宿主服务申请的方法集合。
    methods:
      # Sends an outbound network request.
      # 发起外部网络请求。
      - request
    # Resource boundary declaration limiting which URLs this host service can access.
    # 资源边界声明，限定该宿主服务可访问的 URL。
    resources:
      # Allowed URL or URL pattern.
      # 允许访问的 URL 或 URL pattern。
      - url: https://example.com
  # Host service enum. Allowed values: `runtime`, `cron`, `storage`, `network`, and `data`;
  # `data` accesses authorized database tables.
  # 宿主服务枚举。可选值：`runtime`、`cron`、`storage`、`network`、`data`；`data` 用于访问被授权的数据表。
  - service: data
    # Requested method set for this host service.
    # 当前宿主服务申请的方法集合。
    methods:
      # Lists records with pagination.
      # 分页查询多条记录。
      - list
      # Gets one record by primary key.
      # 按主键读取单条记录。
      - get
      # Creates a record.
      # 新增记录。
      - create
      # Updates a record.
      # 更新记录。
      - update
      # Deletes a record.
      # 删除记录。
      - delete
      # Runs a structured single-table transaction.
      # 执行单表结构化事务。
      - transaction
    # Resource boundary declaration limiting which tables this host service can access.
    # 资源边界声明，限定该宿主服务可访问的数据表。
    resources:
      # List of tables allowed for access.
      # 允许访问的数据表名单。
      tables:
        # Dynamic plugin demo record table.
        # 动态插件示例记录表。
        - plugin_linapro_demo_dynamic_record
  # Host service enum. `config` reads this plugin's own runtime config through config.get only.
  # 宿主服务枚举。`config` 仅通过 config.get 读取当前插件自己的运行期配置。
  - service: config
    methods:
      - get
  # Host service enum. `manifest` reads this plugin's own packaged manifest resources as raw bytes.
  # Paths are relative to the plugin `manifest/` root and do not replace config, SQL, or i18n lifecycle pipelines.
  # 宿主服务枚举。`manifest` 用于读取当前插件自己打包的 manifest 原始资源。
  # 路径相对当前插件的 `manifest/` 根目录，不替代配置、SQL 或 i18n 生命周期管线。
  - service: manifest
    methods:
      - get
    resources:
      paths:
        - config/config.yaml
        - config/profile.yaml
  # Host service enum. `hostConfig` reads whitelisted public host config keys through get.
  # 宿主服务枚举。`hostConfig` 仅通过 get 读取白名单内的宿主公开配置。
  - service: hostConfig
    methods:
      - get
    resources:
      keys:
        - workspace.basePath
        - i18n.default
        - i18n.enabled
  # Host service enum. `org` reads host organization capability projections for the current user.
  # 宿主服务枚举。`org` 用于读取当前用户相关的宿主组织能力投影。
  - service: org
    methods:
      - capability.status
      - capability.available
      - users.dept_assignments.list
      - users.dept_ids.get
      - users.post_ids.get
  # Host service enum. `tenant` reads and validates tenant capability context for the current user.
  # 宿主服务枚举。`tenant` 用于读取并校验当前用户相关的租户能力上下文。
  - service: tenant
    methods:
      - capability.status
      - capability.available
      - tenants.current
      - tenants.platform_bypass
      - tenants.visible.ensure
      - users.tenants.list
# Plugin menu declaration list; the host syncs menus, button permissions, and route entries from it.
# 插件菜单声明列表，宿主按该列表同步菜单、按钮权限和路由入口。
menus:
  # Unique menu key; it must use the `plugin:<plugin-id>:<menu-key>` format.
  # 菜单唯一键，必须使用 `plugin:<plugin-id>:<menu-key>` 格式。
  - key: plugin:linapro-demo-dynamic:main-entry
    # Parent menu key pointing to the host extension center catalog.
    # 父级菜单键，指向宿主扩展中心目录。
    parent_key: extension
    # Menu display name.
    # 菜单显示名称。
    name: 动态插件示例
    # Hosted static asset entry path for the dynamic plugin.
    # 动态插件静态资源托管入口路径。
    path: /x-assets/linapro-demo-dynamic/v0.1.0/mount.js
    # Menu render component; the dynamic page shell hosts plugin pages.
    # 菜单渲染组件，动态页壳用于承载插件页面。
    component: system/plugin/dynamic-page
    # Permission code required to access this menu.
    # 菜单访问权限标识。
    perms: linapro-demo-dynamic:view
    # Menu icon using an Iconify icon name.
    # 菜单图标，使用 Iconify 图标名称。
    icon: ant-design:deployment-unit-outlined
    # Menu type enum. Allowed values: `D` directory, `M` menu page, `B` button permission node.
    # 菜单类型枚举。可选值：`D` 表示目录，`M` 表示菜单页面，`B` 表示按钮权限点。
    type: M
    # Menu sort order; lower values appear earlier.
    # 菜单排序值，数值越小越靠前。
    sort: 3
    # Route query parameters used to declare dynamic plugin mount mode and page parameters.
    # 路由查询参数，用于声明动态插件挂载模式等页面参数。
    query:
      # Plugin access mode enum. Allowed value currently used by manifests: `embedded-mount`, which means host-embedded mounting.
      # 插件访问模式枚举。当前清单使用的可选值：`embedded-mount`，表示宿主内嵌挂载。
      pluginAccessMode: embedded-mount
    # Menu remark stored in host menu governance data.
    # 菜单备注，写入宿主菜单治理数据。
    remark: linapro-demo-dynamic embedded mount menu entry

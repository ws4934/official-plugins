# Plugin identifier, unique across the host and source plugin directories; use `kebab-case`.
# 插件唯一标识，必须在宿主和源码插件目录中保持唯一，并使用 `kebab-case` 命名风格。
id: linapro-demo-source

# Plugin display name used in plugin management pages, developer docs, and presentation.
# 插件显示名称，用于插件管理页面、开发文档和展示。
name: 源码插件示例

# Plugin semantic version; examples in this repo use the `v` prefix.
# 插件语义化版本号，当前示例统一使用带 `v` 前缀的写法。
version: v0.1.0

# Plugin type enum. Allowed values: `source` is compiled with the host; `dynamic` is loaded as a runtime plugin artifact.
# 插件类型枚举。可选值：`source` 表示随宿主源码编译交付；`dynamic` 表示作为运行时动态插件产物加载。
type: source

# Multi-tenant scope enum. Allowed values: `platform_only` is platform-context only; `tenant_aware` is governed by tenant context.
# 多租户作用域枚举。可选值：`platform_only` 表示仅平台上下文可见和治理；`tenant_aware` 表示按租户上下文治理。
scope_nature: tenant_aware

# Multi-tenant support flag. `true` means the plugin supports tenant-level installation and provisioning governance.
# 多租户支持标记。`true` 表示插件支持租户级安装与开通治理。
supports_multi_tenant: true

# Default install mode enum. Allowed values: `global` enables one shared installation; `tenant_scoped` enables or disables per tenant.
# 默认安装模式枚举。可选值：`global` 表示全局统一安装启用；`tenant_scoped` 表示按租户独立启用或禁用。
default_install_mode: tenant_scoped

# Plugin description summarizing the capability boundary.
# 插件说明，概述插件的能力边界。
description: 提供左侧菜单页面与公开/受保护路由示例的源码插件

# Plugin author or owning team.
# 插件作者或归属团队。
author: linapro

# Plugin homepage or documentation URL for extra project, design, or external references.
# 插件主页或文档地址，用于补充项目介绍、设计文档或外部说明链接。
homepage: https://example.com/lina/plugins/linapro-demo-source

# Plugin license identifier.
# 插件许可证标识。
license: Apache-2.0

# Plugin internationalization config. This follows the host i18n config shape;
# enabled plugins must ship manifest/i18n resources for the listed locales.
# 插件国际化配置。该配置与宿主 i18n 配置结构保持一致；启用后需提供对应语言资源。
i18n:
  enabled: true
  default: zh-CN
  locales:
    - locale: en-US
      nativeName: English
    - locale: zh-CN
      nativeName: 简体中文

# Plugin menu declaration list; the host syncs menus, button permissions, and route entries from it.
# 插件菜单声明列表，宿主按该列表同步菜单、按钮权限和路由入口。
menus:
  # Unique menu key; it must use the `plugin:<plugin-id>:<menu-key>` format.
  # 菜单唯一键，必须使用 `plugin:<plugin-id>:<menu-key>` 格式。
  - key: plugin:linapro-demo-source:sidebar-entry
    # Menu display name.
    # 菜单显示名称。
    name: 源码插件示例
    # Source plugin host route segment mounted into the governed dynamic route tree.
    # 源码插件宿主内路由片段，会挂到插件治理后的动态路由树中。
    path: linapro-demo-source-sidebar-entry
    # Menu render component; the dynamic page shell hosts plugin pages.
    # 菜单渲染组件，动态页壳用于承载插件页面。
    component: system/plugin/dynamic-page
    # Permission code required to access this menu.
    # 菜单访问权限标识。
    perms: linapro-demo-source:example:view
    # Menu icon using an Iconify icon name.
    # 菜单图标，使用 Iconify 图标名称。
    icon: ant-design:appstore-outlined
    # Menu type enum. Allowed values: `D` directory, `M` menu page, `B` button permission node.
    # 菜单类型枚举。可选值：`D` 表示目录，`M` 表示菜单页面，`B` 表示按钮权限点。
    type: M
    # Menu sort order; lower values appear earlier.
    # 菜单排序值，数值越小越靠前。
    sort: -1
    # Menu remark stored in host menu governance data.
    # 菜单备注，写入宿主菜单治理数据。
    remark: 源码插件示例左侧菜单
  # Unique button key mounted under the source plugin demo menu.
  # 按钮唯一键，挂载在源码插件示例菜单下。
  - key: plugin:linapro-demo-source:record-create
    # Parent menu key pointing to the source plugin demo menu.
    # 父级菜单键，指向源码插件示例菜单。
    parent_key: plugin:linapro-demo-source:sidebar-entry
    # Button display name.
    # 按钮显示名称。
    name: 示例记录新增
    # Button permission code.
    # 按钮权限标识。
    perms: linapro-demo-source:example:create
    # Menu type enum. Allowed values: `D` directory, `M` menu page, `B` button permission node.
    # 菜单类型枚举。可选值：`D` 表示目录，`M` 表示菜单页面，`B` 表示按钮权限点。
    type: B
    # Button sort order; lower values appear earlier.
    # 按钮排序值，数值越小越靠前。
    sort: 1
    # Button remark stored in host menu governance data.
    # 按钮备注，写入宿主菜单治理数据。
    remark: 源码插件示例记录新增权限
  # Unique button key mounted under the source plugin demo menu.
  # 按钮唯一键，挂载在源码插件示例菜单下。
  - key: plugin:linapro-demo-source:record-update
    # Parent menu key pointing to the source plugin demo menu.
    # 父级菜单键，指向源码插件示例菜单。
    parent_key: plugin:linapro-demo-source:sidebar-entry
    # Button display name.
    # 按钮显示名称。
    name: 示例记录修改
    # Button permission code.
    # 按钮权限标识。
    perms: linapro-demo-source:example:update
    # Menu type enum. Allowed values: `D` directory, `M` menu page, `B` button permission node.
    # 菜单类型枚举。可选值：`D` 表示目录，`M` 表示菜单页面，`B` 表示按钮权限点。
    type: B
    # Button sort order; lower values appear earlier.
    # 按钮排序值，数值越小越靠前。
    sort: 2
    # Button remark stored in host menu governance data.
    # 按钮备注，写入宿主菜单治理数据。
    remark: 源码插件示例记录修改权限
  # Unique button key mounted under the source plugin demo menu.
  # 按钮唯一键，挂载在源码插件示例菜单下。
  - key: plugin:linapro-demo-source:record-delete
    # Parent menu key pointing to the source plugin demo menu.
    # 父级菜单键，指向源码插件示例菜单。
    parent_key: plugin:linapro-demo-source:sidebar-entry
    # Button display name.
    # 按钮显示名称。
    name: 示例记录删除
    # Button permission code.
    # 按钮权限标识。
    perms: linapro-demo-source:example:delete
    # Menu type enum. Allowed values: `D` directory, `M` menu page, `B` button permission node.
    # 菜单类型枚举。可选值：`D` 表示目录，`M` 表示菜单页面，`B` 表示按钮权限点。
    type: B
    # Button sort order; lower values appear earlier.
    # 按钮排序值，数值越小越靠前。
    sort: 3
    # Button remark stored in host menu governance data.
    # 按钮备注，写入宿主菜单治理数据。
    remark: 源码插件示例记录删除权限
